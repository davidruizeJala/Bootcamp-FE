<section class="mx-auto max-w-6xl px-4 py-6">
  <header class="mb-6">
    <h1 class="text-2xl font-bold text-slate-900">Mi colección</h1>
    <p class="text-sm text-slate-500">
      Cartas favoritas de {{ profile.alias() }}.
    </p>
  </header>

  @if (profile.favorites().length) {
    <div class="grid grid-cols-2 gap-4 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5">
      @for (card of profile.favorites(); track card.id) {
        <app-card-thumb
          [appHighlightAtk]="card"
          [card]="card"
          [favorite]="true"
          (select)="onSelect($event)"
          (toggleFavorite)="onToggleFavorite($event)"
        />
      }
    </div>
  } @else {
    <div class="py-20 text-center text-slate-500">
      <p class="text-lg">Tu colección está vacía.</p>
      <p class="text-sm">Marca cartas con ♥ en el catálogo para verlas aquí.</p>
    </div>
  }
</section>
