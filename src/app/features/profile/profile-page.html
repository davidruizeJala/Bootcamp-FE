<section class="mx-auto max-w-md px-4 py-10">
  <h1 class="text-2xl font-bold text-slate-900">Perfil de duelista</h1>
  <p class="mt-1 mb-6 text-sm text-slate-500">
    Elige un alias para desbloquear tu colección personal.
  </p>

  <form (submit)="save($event)" class="flex flex-col gap-3">
    <label for="alias" class="text-sm font-medium text-slate-700">Alias</label>
    <input
      id="alias"
      type="text"
      [value]="draft()"
      (input)="onInput($event)"
      placeholder="Ej. Yugi Muto"
      class="rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-200"
    />
    <button
      type="submit"
      [disabled]="!draft().trim()"
      class="rounded-lg bg-indigo-600 px-4 py-2 font-medium text-white transition hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-50"
    >
      Guardar y entrar
    </button>
  </form>
</section>
