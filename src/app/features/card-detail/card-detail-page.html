<section class="mx-auto max-w-4xl px-4 py-6">
  <a
    routerLink="/"
    class="mb-6 inline-flex items-center gap-1 text-sm font-medium text-indigo-600 transition hover:text-indigo-800"
  >
    ← Volver al catálogo
  </a>

  @if (card(); as c) {
    <article class="grid gap-6 md:grid-cols-[280px_1fr]">
      <div>
        <img
          [src]="c.card_images[0].image_url"
          [alt]="c.name"
          class="w-full rounded-xl border border-slate-200 shadow-md"
        />
      </div>

      <div>
        <h1 class="text-2xl font-bold text-slate-900">{{ c.name }}</h1>
        <p class="mb-4 text-sm text-slate-500">
          {{ c.humanReadableCardType || c.type }}
        </p>

        <nav class="mb-4 flex gap-1 border-b border-slate-200" role="tablist">
          <a
            routerLink="efecto"
            routerLinkActive="border-indigo-600 text-indigo-600"
            class="-mb-px border-b-2 border-transparent px-4 py-2 text-sm font-medium text-slate-500 transition hover:text-slate-800"
          >
            Efecto
          </a>
          <a
            routerLink="estadisticas"
            routerLinkActive="border-indigo-600 text-indigo-600"
            class="-mb-px border-b-2 border-transparent px-4 py-2 text-sm font-medium text-slate-500 transition hover:text-slate-800"
          >
            Estadísticas
          </a>
          <a
            routerLink="precio"
            routerLinkActive="border-indigo-600 text-indigo-600"
            class="-mb-px border-b-2 border-transparent px-4 py-2 text-sm font-medium text-slate-500 transition hover:text-slate-800"
          >
            Precio
          </a>
        </nav>

        <router-outlet />
      </div>
    </article>
  }
</section>
