<div class="w-full">
  <div
    role="tablist"
    class="flex gap-1 border-b border-slate-200"
  >
    @for (panel of panels(); track panel.title(); let i = $index) {
      <button
        type="button"
        role="tab"
        [attr.aria-selected]="i === activeIndex()"
        (click)="select(i)"
        class="-mb-px border-b-2 px-4 py-2 text-sm font-medium transition"
        [class.border-indigo-600]="i === activeIndex()"
        [class.text-indigo-700]="i === activeIndex()"
        [class.border-transparent]="i !== activeIndex()"
        [class.text-slate-500]="i !== activeIndex()"
        [class.hover:text-slate-800]="i !== activeIndex()"
      >
        {{ panel.title() }}
      </button>
    }
  </div>

  <div class="pt-4">
    <ng-content />
  </div>
</div>
