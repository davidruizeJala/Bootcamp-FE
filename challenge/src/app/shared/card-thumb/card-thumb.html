<button
  type="button"
  (click)="select.emit(card())"
  class="group flex w-full flex-col overflow-hidden rounded-xl border border-slate-200 bg-white text-left shadow-sm transition hover:-translate-y-1 hover:border-indigo-300 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-indigo-400"
>
  <div class="aspect-[3/4] w-full overflow-hidden bg-slate-100">
    @if (imageFailed() || !card().card_images.length) {
      <div class="flex h-full w-full items-center justify-center text-4xl text-slate-300">
        🃏
      </div>
    } @else {
      <img
        [src]="card().card_images[0].image_url_small"
        [alt]="card().name"
        loading="lazy"
        (error)="imageFailed.set(true)"
        class="h-full w-full object-cover transition group-hover:scale-105"
      />
    }
  </div>
  <div class="flex flex-1 flex-col gap-1 p-3">
    <h3 class="line-clamp-2 text-sm font-semibold text-slate-900">
      {{ card().name }}
    </h3>
    <p class="text-xs text-slate-500">
      {{ card().humanReadableCardType || card().type }}
    </p>
  </div>
</button>
