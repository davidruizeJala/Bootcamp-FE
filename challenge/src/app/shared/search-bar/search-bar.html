<form class="flex w-full items-center gap-2" (submit)="submit($event)">
  <div class="relative flex-1">
    <span
      class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
      aria-hidden="true"
    >
      🔍
    </span>
    <input
      #box
      type="search"
      name="query"
      [value]="term()"
      placeholder="Busca una carta por nombre (ej. Dragon)"
      autocomplete="off"
      aria-label="Buscar cartas por nombre"
      class="w-full rounded-lg border border-slate-300 bg-white py-2.5 pl-10 pr-3 text-slate-900 shadow-sm outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200"
    />
  </div>
  <button
    type="submit"
    class="rounded-lg bg-indigo-600 px-4 py-2.5 font-medium text-white shadow-sm transition hover:bg-indigo-700 active:scale-95"
  >
    Buscar
  </button>
</form>
